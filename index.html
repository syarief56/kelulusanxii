<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelulusan SMA Islam Pujer</title>

<style>
html, body {
  height: 100%;
  margin: 0;
}

body {
  font-family: Arial, sans-serif;
  color: white;
  background: linear-gradient(180deg, #5fb3ff, #003366);
}

/* CONTAINER */
.container {
  min-height: 100vh;
  text-align: center;
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

.header img {
  width: 70px;
  height: 70px;
  object-fit: contain;
}

.header-text {
  text-align: left;
}

.header-text h2 {
  margin: 0;
  font-size: 20px;
}

.header-text p {
  margin: 0;
  font-size: 12px;
  color: yellow;
}

/* GARIS */
.line {
  width: 100%;
  max-width: 600px;
  height: 3px;
  background: yellow;
  margin: 15px auto;
}

/* JUDUL */
.title {
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 30px;
}

/* ============================= */
/* TOMBOL KLIK DI SINI */
/* ============================= */

.btn-container {
  margin-top: 20px;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
}

.btn {
  padding: 12px 30px;
  background: linear-gradient(135deg, #ffd700, #ff9900);
  color: black;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  background: linear-gradient(135deg, #ffcc00, #ff8800);
}

/* INPUT BOX */
.password-box {
  margin-top: 40px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 10px;
  max-width: 300px;
  margin-left: auto;
  margin-right: auto;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
}

.password-box input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
}

.password-box button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 5px;
  background: yellow;
  font-weight: bold;
  cursor: pointer;
}

/* HASIL */
#hasilBox {
  display: none;
  margin-top: 30px;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
}

table {
  width: 100%;
  max-width: 500px;
  margin: auto;
  border-collapse: collapse;
  background: white;
  color: black;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
}

th {
  background: #003366;
  color: white;
}
</style>
</head>
