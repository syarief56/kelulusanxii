<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelulusan SMA Islam Pujer</title>

<style>
html, body {
  height: 100%;
  margin: 0;
}

body {
  font-family: Arial, sans-serif;
  color: white;
  background: linear-gradient(180deg, #5fb3ff, #003366);
}

/* CONTAINER */
.container {
  min-height: 100vh;
  text-align: center;
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

.header img {
  width: 70px;
  height: 70px;
  object-fit: contain;
}

.header-text {
  text-align: left;
}

.header-text h2 {
  margin: 0;
  font-size: 20px;
}

.header-text p {
  margin: 0;
  font-size: 12px;
  color: yellow;
}

/* GARIS */
.line {
  width: 100%;
  max-width: 600px;
  height: 3px;
  background: yellow;
  margin: 15px auto;
}

/* JUDUL */
.title {
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 30px;
}

/* ============================= */
/* TOMBOL KLIK DI SINI */
/* ============================= */

.btn-container {
  margin-top: 20px;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
}

.btn {
  padding: 12px 30px;
  background: linear-gradient(135deg, #ffd700, #ff9900);
  color: black;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  background: linear-gradient(135deg, #ffcc00, #ff8800);
}

/* INPUT BOX */
.password-box {
  margin-top: 40px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 10px;
  max-width: 300px;
  margin-left: auto;
  margin-right: auto;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
}

.password-box input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
}

.password-box button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 5px;
  background: yellow;
  font-weight: bold;
  cursor: pointer;
}

/* HASIL */
#hasilBox {
  display: none;
  margin-top: 30px;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
}

table {
  width: 100%;
  max-width: 500px;
  margin: auto;
  border-collapse: collapse;
  background: white;
  color: black;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
}

th {
  background: #003366;
  color: white;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <img src="" alt="Logo Sekolah">
    <div class="header-text">
      <h2>SMA ISLAM PUJER BONDOWOSO</h2>
      <p>Jl. Raya Pujer No. 15, Desa Kejayan, Kec Pujer</p>
    </div>
  </div>

  <div class="line"></div>

  <!-- JUDUL -->
  <div class="title">
    PENETAPAN KELULUSAN PESERTA DIDIK KELAS XII<br>
    SMA ISLAM PUJER<br>
    TAHUN PELAJARAN 2025/2026
  </div>

  <!-- TOMBOL -->
  <div class="btn-container" id="btnBox">
    <a href="https://drive.google.com/file/d/1qYSvq8OMVmB2WG43YW7nKyIFMYPERifc/preview" target="_blank">
      <button class="btn">Klik di sini</button>
    </a>
  </div>

  <!-- INPUT NISN -->
  <div class="password-box" id="pwBox">
    <p>Masukkan NISN</p>
    <input type="text" id="nisn" placeholder="Contoh: 1234567890">
    <button onclick="cek()">Cek Kelulusan</button>
  </div>

  <!-- HASIL -->
  <div id="hasilBox">
    <h3>Hasil Kelulusan</h3>
    <table>
      <tr>
        <th>Nama</th>
        <th>NISN</th>
        <th>Kelas</th>
        <th>Status</th>
      </tr>
      <tr>
        <td id="nama"></td>
        <td id="nisnH"></td>
        <td id="kelas"></td>
        <td id="status"></td>
      </tr>
    </table>
  </div>

</div>

<script>

// ANIMASI MUNCUL
window.onload = function() {

  // tombol dulu
  setTimeout(() => {
    let btnBox = document.getElementById("btnBox");
    btnBox.style.opacity = 1;
    btnBox.style.transform = "translateY(0)";
  }, 800);

  // input setelahnya
  setTimeout(() => {
    let box = document.getElementById("pwBox");
    box.style.opacity = 1;
    box.style.transform = "translateY(0)";
  }, 1500);

};

// DATA SISWA (EDIT DI SINI)
var dataSiswa = [
  { nisn: "1234567890", nama: "Ahmad Fauzi", kelas: "XII IPA 1", status: "LULUS" },
  { nisn: "0987654321", nama: "Siti Aminah", kelas: "XII IPS 2", status: "LULUS" },
  { nisn: "1111111111", nama: "Budi Santoso", kelas: "XII IPA 2", status: "TIDAK LULUS" }
];

// CEK NISN
function cek() {
  var input = document.getElementById("nisn").value;
  var ketemu = false;

  for (var i = 0; i < dataSiswa.length; i++) {

    if (input === dataSiswa[i].nisn) {

      document.getElementById("nama").innerText = dataSiswa[i].nama;
      document.getElementById("nisnH").innerText = dataSiswa[i].nisn;
      document.getElementById("kelas").innerText = dataSiswa[i].kelas;

      document.getElementById("status").innerHTML =
        dataSiswa[i].status === "LULUS"
        ? "<span style='color:green;font-weight:bold;'>LULUS</span>"
        : "<span style='color:red;font-weight:bold;'>TIDAK LULUS</span>";

      let hasil = document.getElementById("hasilBox");
      hasil.style.display = "block";

      setTimeout(() => {
        hasil.style.opacity = 1;
        hasil.style.transform = "translateY(0)";
      }, 300);

      ketemu = true;
      break;
    }
  }

  if (!ketemu) {
    alert("NISN tidak ditemukan!");
  }
}

</script>

</body>
</html>
